<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Web Android Emulator</title>
    <script src="https://unpkg.com/v86@0.5.372/build/libv86.js"></script>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        #screen_container {
            width: 800px;
            height: 600px;
            background-color: black;
            margin: 20px auto;
            border: 4px solid #333;
            border-radius: 8px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.3);
        }
        #screen_container canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <h2 style="text-align: center;">My Browser Android Emulator</h2>
    <p style="text-align: center; color: #666;">Booting system... Please wait.</p>
    
    <div id="screen_container"></div>

    <script>
        window.onload = function() {
            // This specific version script exposes the classic global 'V86' object
            var emulator = new V86({
                wasm_path: "https://unpkg.com/v86@0.5.372/build/v86.wasm", 
                memory_size: 512 * 1024 * 1024, 
                vga_as_hd: true,
                
                // Keep the tiny test linux.iso pinned too so we can see it fire up instantly!
                cdrom: { url: "https://unpkg.com/v86@0.5.372/images/linux.iso" }, 
                
                screen_container: document.getElementById("screen_container"),
                
                bios: { url: "https://unpkg.com/v86@0.5.372/bios/seabios.bin" },
                vga_bios: { url: "https://unpkg.com/v86@0.5.372/bios/vgabios.bin" },
                autostart: true,
            });
        };
    </script>
</body>
</html>
