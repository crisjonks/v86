<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Web Android Emulator</title>
    <script src="https://copy.sh/v86/build/libv86.js"></script>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        #screen_container {
            width: 800px;
            height: 600px;
            background-color: black;
            margin: 20px auto;
            border: 4px solid #333;
            border-radius: 8px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.3);
        }
        #screen_container canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <h2 style="text-align: center;">My Browser Android Emulator</h2>
    <p style="text-align: center; color: #666;">Loading Android 4.4... Please wait a few moments for the bootloader screen.</p>
    
    <div id="screen_container"></div>

    <script>
        window.onload = function() {
            // Using V86Starter constructor provided by the libv86 script
            var emulator = new V86Starter({
                // Grab the WebAssembly binary execution files online
                wasm_path: "https://copy.sh/v86/build/v86.wasm", 
                memory_size: 512 * 1024 * 1024, // 512MB RAM allocation
                vga_as_hd: true,
                
                // Your live GitHub Release ISO file link
                cdrom: { url: "https://github.com/crisjonks/v86/releases/download/Android/android-x86-4.4-r2.iso" }, 
                
                screen_container: document.getElementById("screen_container"),
                
                // Official online BIOS paths so you don't have to compile them
                bios: { url: "https://copy.sh/v86/bios/seabios.bin" },
                vga_bios: { url: "https://copy.sh/v86/bios/vgabios.bin" },
                autostart: true,
            });
        };
    </script>
</body>
</html>
